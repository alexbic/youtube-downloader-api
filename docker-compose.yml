version: '3.8'

# ========================================
# YouTube Downloader API — PUBLIC VERSION
# ========================================
#
# Self-contained Docker container: Redis + bgutil + orchestrator + gunicorn
# all run inside a single container managed by Supervisor.
#
# PUBLIC VERSION — fixed limits (not configurable):
#   Workers        : 2
#   Task TTL       : 24 hours
#   Redis          : built-in, 256 MB
#   Max concurrent : 2
#
# For flexible configuration and advanced features see the Pro version.
#

services:
  youtube-downloader:
    image: alexbic/youtube-downloader-api:latest

    # Uncomment to build locally instead:
    # build: .

    ports:
      - "${HOST_PORT:-5002}:5000"

    volumes:
      # Downloaded files and task metadata (auto-deleted after 24 h)
      - ./tasks:/app/tasks

      # OPTIONAL: YouTube cookies to bypass geo/age restrictions
      # Export from browser with a cookies.txt extension, then uncomment:
      # - ./cookies.txt:/app/cookies.txt:ro

    environment:
      # Public base URL for generating absolute download links.
      # Examples: https://ytdl.example.com  or  http://192.168.1.10:5002
      # Leave empty for internal/local use.
      SERVER_BASE_URL: ${SERVER_BASE_URL:-}

      # API Key (Bearer token). Leave empty to disable auth.
      # Generate: openssl rand -hex 32
      API_KEY: ${API_KEY:-}

      # Max video file size in MB (default: 2048)
      MAX_DOWNLOAD_VIDEO_SIZE_MB: ${MAX_DOWNLOAD_VIDEO_SIZE_MB:-2048}

      # Log level: DEBUG | INFO | WARNING | ERROR
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    restart: unless-stopped
